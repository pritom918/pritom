name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build Debug APK (Self-Signed, Immediately Installable)
      run: |
        cd instaoff-android
        gradle assembleDebug

    - name: Build Release APK (Unsigned)
      run: |
        cd instaoff-android
        gradle assembleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptm-debug-apk
        path: instaoff-android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptm-release-apk
        path: instaoff-android/app/build/outputs/apk/release/app-release-unsigned.apk
